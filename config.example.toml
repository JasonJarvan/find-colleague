# 复制为 config.toml（已 gitignore），填入 OpenRouter key。
# 或者不建本文件，直接设环境变量 OPENROUTER_API_KEY（env 优先级更高）。

[openrouter]
api_key = "sk-or-..."            # OpenRouter API key
base_url = "https://openrouter.ai/api/v1"
# 中文短文本语义召回选型（subagent 实测 OpenRouter live 接口）：
#   qwen/qwen3-embedding-8b  4096维 $0.01/1M  CMTEB 69.44  ← 默认（性价比+中文最强）
#   qwen/qwen3-embedding-4b  2560维 $0.02/1M  CMTEB 68.46  （维度更小）
#   baai/bge-m3              1024维 $0.01/1M               （最轻量备选）
# 换模型只需改这里并重跑 `find-colleague ingest`（重新 embedding）。
embed_model = "qwen/qwen3-embedding-8b"

[storage]
db_path = "data/find_colleague.db"

[provider]
# v3 service 自动跑「抽取/清洗」(LLM#1+#2, 见 prompts/extract.md) 时用的 chat LLM。
# v2 手动 refresh 时改用 subagent（便宜的 Claude 模型），不读这里。
# 走 OpenRouter chat：POST {base_url}/chat/completions。
llm = "anthropic/claude-haiku-4.5"
